# Reusable: build self-contained flowR binaries for every platform and upload
# them to `release_tag`. Called by release.yaml and build-flowr-binaries.yaml.
#
# flowR itself is not modified: we compile the published npm CLI with `bun build
# --compile`, which inlines every module; the two tree-sitter .wasm files ship
# alongside and are loaded from disk.
#
# Two jobs:
#   build  - a single Linux runner cross-compiles all five targets (Bun's
#            --target does darwin/windows/arm from x64 Linux), signs them, and
#            uploads. This keeps the release-producing step off the scarce
#            macos-13 / windows runners, so a busy runner pool can never stall
#            the actual publish.
#   smoke  - a per-platform matrix downloads each *uploaded* asset and boots it
#            natively, as a post-publish safeguard. If a native runner is
#            starved it only delays this check; the binaries are already live.
name: binaries

on:
  workflow_call:
    inputs:
      flowr_version:
        required: true
        type: string
      release_tag:
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: build + upload all targets
    runs-on: ubuntu-latest
    steps:
      - name: Validate inputs
        shell: bash
        run: |
          set -euo pipefail
          [ -n "${{ inputs.flowr_version }}" ] || { echo "::error::flowr_version input is empty"; exit 1; }
          [ -n "${{ inputs.release_tag }}"  ] || { echo "::error::release_tag input is empty";  exit 1; }
          echo "building flowR ${{ inputs.flowr_version }} -> release ${{ inputs.release_tag }} (all targets)"
      - uses: actions/checkout@v4
      # bun both installs the npm package and cross-compiles every target, so no
      # separate Node/npm toolchain is needed. (The compiled binary is
      # self-contained; the bundled engine that needs Node lives in the R
      # package, not this workflow.)
      #
      # Pin the version: the compiled program's argv layout is Bun-version
      # dependent on Windows (older Bun handed [exe, ...args], a leading entry
      # short of Node's [exe, script, ...args], which broke flowR's argv.slice(2);
      # 1.3.14 aligns Windows with the Node/Unix layout). Pinning keeps that
      # layout deterministic so the binaries' arg handling can't silently regress.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install flowR (the published npm package)
        shell: bash
        run: |
          # bun add needs a manifest to install into
          printf '{}\n' > package.json
          # `ignore` is a peer import of flowR's CLI that bun must resolve when
          # compiling; install it alongside flowR.
          bun add "@eagleoutice/flowr@${{ inputs.flowr_version }}" ignore

      - name: Cross-compile, package + sign every target
        shell: bash
        env:
          FLOWR_SIGNING_KEY: ${{ secrets.FLOWR_SIGNING_KEY }}
          FLOWR_VERSION: ${{ inputs.flowr_version }}
        run: |
          set -euo pipefail
          entry=./node_modules/@eagleoutice/flowr/cli/flowr.js
          # the two tree-sitter wasm blobs are platform-independent; ship them
          # unchanged next to every binary.
          # -print -quit: stop at the first match in-process, so no SIGPIPE can
          # trip `set -o pipefail` (a `find | head` would).
          wr=$(find node_modules -name 'tree-sitter-r.wasm' -print -quit)
          wt=$(find node_modules -name 'tree-sitter.wasm'   -print -quit)
          [ -n "$wr" ] && [ -n "$wt" ] || { echo "::error::tree-sitter wasm not found in node_modules"; exit 1; }
          mkdir -p out
          # release target  ->  bun --target triple
          while read -r target buntarget; do
            [ -n "$target" ] || continue
            ext=""; [ "$target" = "win-x64" ] && ext=".exe"
            echo "::group::compile $target ($buntarget)"
            rm -rf dist; mkdir -p dist
            # --bytecode precompiles for faster startup + smaller binaries; it can
            # error on ESM-only entrypoints in some Bun versions, so fall back.
            bun build "$entry" --compile --minify --sourcemap=none --bytecode \
              --target="$buntarget" --outfile "dist/flowr${ext}" \
            || bun build "$entry" --compile --minify --sourcemap=none \
              --target="$buntarget" --outfile "dist/flowr${ext}"
            cp "$wr" "$wt" dist/
            tgz="flowr-${FLOWR_VERSION}-${target}.tar.gz"
            tar -czf "out/${tgz}" -C dist .
            (
              cd out
              sha256sum "$tgz" > "${tgz}.sha256"
              # openssl ECDSA/SHA-256 so the R `openssl` package verifies it, no gpg.
              if [ -n "${FLOWR_SIGNING_KEY:-}" ]; then
                printf '%s' "$FLOWR_SIGNING_KEY" > signing_key.pem
                openssl dgst -sha256 -sign signing_key.pem -out "${tgz}.sig" "$tgz"
                rm -f signing_key.pem
              else
                echo "No FLOWR_SIGNING_KEY secret; SHA-256 only for ${target}."
              fi
            )
            echo "::endgroup::"
            echo "- \`${tgz}\` built" >> "$GITHUB_STEP_SUMMARY"
          done <<'TARGETS'
          linux-x64      bun-linux-x64
          linux-arm64    bun-linux-arm64
          darwin-x64     bun-darwin-x64
          darwin-arm64   bun-darwin-arm64
          win-x64        bun-windows-x64
          TARGETS

      - name: Upload to the release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          # This release only hosts the downloadable engine binaries, keyed by
          # flowR version (the R client builds its download URL from this tag).
          # It is NOT the product release: keep it off "Latest" so the
          # adapter-versioned release (v<adapter>) stays the prominent one, and
          # label it clearly.
          name: flowR engine binaries — ${{ inputs.flowr_version }}
          make_latest: false
          body: |
            Prebuilt, self-contained **flowR ${{ inputs.flowr_version }}** engine
            binaries (per platform), downloaded on demand by the flowr R adapter.
            This is an asset store keyed by flowR version, **not** an adapter
            release — see the [latest adapter release](https://github.com/flowr-analysis/flowr-r-adapter/releases/latest)
            for the versioned package.
          # false, not true: signing is optional (no FLOWR_SIGNING_KEY -> no .sig
          # files), so the *.sig glob legitimately matches nothing. A genuinely
          # missing binary is caught downstream — the smoke job's
          # `gh release download --pattern` errors if its asset is absent.
          fail_on_unmatched_files: false
          files: |
            out/*.tar.gz
            out/*.tar.gz.sha256
            out/*.tar.gz.sig

  # Post-publish safeguard: pull each uploaded asset and confirm the binary
  # actually boots flowR (prints the REPL banner) on its native platform. Runs
  # after the upload, so a broken build is caught and reported loudly even though
  # the asset is already in place.
  smoke:
    name: smoke ${{ matrix.target }}
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,     target: linux-x64 }
          - { os: ubuntu-24.04-arm,  target: linux-arm64 }
          - { os: macos-13,          target: darwin-x64 }
          - { os: macos-latest,      target: darwin-arm64 }
          - { os: windows-latest,    target: win-x64 }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Download the uploaded binary for this platform
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          asset="flowr-${{ inputs.flowr_version }}-${{ matrix.target }}.tar.gz"
          gh release download "${{ inputs.release_tag }}" \
            --repo "$GITHUB_REPOSITORY" --pattern "$asset" --dir dl
          mkdir -p run
          tar -xzf "dl/$asset" -C run

      - name: Smoke-test the uploaded binary
        shell: bash
        run: |
          set -uo pipefail
          ext=""; [ "${{ matrix.target }}" = "win-x64" ] && ext=".exe"
          cd run
          chmod +x "flowr${ext}" 2>/dev/null || true
          wr=$(find . -name 'tree-sitter-r.wasm' | head -1)
          wt=$(find . -name 'tree-sitter.wasm'   | head -1)
          printf ':quit\n' | "./flowr${ext}" --default-engine tree-sitter \
            --engine.r-shell.disabled \
            --engine.tree-sitter.wasm-path "$wr" \
            --engine.tree-sitter.tree-sitter-wasm-path "$wt" > smoke.log 2>&1 || true
          if grep -q "flowR repl" smoke.log; then
            echo "✅ **${{ matrix.target }}** — binary boots flowR" >> "$GITHUB_STEP_SUMMARY"
            echo "smoke OK for ${{ matrix.target }}"
          else
            {
              echo "❌ **${{ matrix.target }}** — binary does NOT boot"
              echo '```'
              tail -n 40 smoke.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            echo "SMOKE TEST FAILED for ${{ matrix.target }} - the binary does not run:"
            cat smoke.log
            exit 1
          fi
