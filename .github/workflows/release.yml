name: release
on:
  push:
    branches: [main]
jobs:
  test:
    name: Test for release
    if: startsWith(github.event.head_commit.message, '[release:minor]') ||
      startsWith(github.event.head_commit.message, '[release:major]') ||
      startsWith(github.event.head_commit.message, '[release:patch]')
    uses: flowr-analysis/flowr-r-adapter/.github/workflows/test.yml@main

  release:
    runs-on: ubuntu-latest
    needs: [test]
    outputs:
      flowr_version: ${{ steps.fv.outputs.flowr_version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          # full history (not a depth-1 shallow clone): usethis::use_github_release()
          # compares local main against origin/main, which needs the commit
          # ancestry — a shallow clone makes libgit2 fail with "object not found".
          fetch-depth: 0
      - name: Configure git user
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: 4.4.0
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: devtools, usethis

      - name: Bump version
        run: |
          step=$(echo "$MESSAGE" | sed -n -E 's/\[release:(patch|minor|major)].*/\1/p')
          if [ -z "$step" ]; then
            echo "fatal: Release step not found in commit message."
            exit 1
          fi
          Rscript -e "usethis::use_version(\"$step\")"
        env:
          # putting the message into an env variable first sanitizes it
          MESSAGE: ${{ github.event.head_commit.message }}

      # we have to do this manually since use_version only commits and pushes if it's interactive for some reason
      - name: Commit and push
        shell: bash
        run: |
          set -euo pipefail
          new_version=$(sed -n -E "s/Version: (.*)/\1/p" DESCRIPTION)
          if [ -z "$new_version" ]; then
            echo "::error::could not read the bumped version from DESCRIPTION"; exit 1
          fi
          git commit -a -m "[skip ci] Release $new_version"
          git push

      - name: GitHub release
        run: Rscript -e 'usethis::use_github_release()'
        env:
          GITHUB_PAT: ${{ secrets.RELEASE_TOKEN }}

      - name: Read the flowR version to build binaries for
        id: fv
        shell: bash
        run: |
          set -euo pipefail
          fv=$(grep -m1 -E '^[[:space:]]*flowr_version[[:space:]]*=' R/config.R | grep -oE '"[^"]*"' | head -1 | tr -d '"' || true)
          if [ -z "$fv" ]; then
            echo "::error::could not read flowr_version from R/config.R (binaries would upload to an empty 'flowr-v' tag)"; exit 1
          fi
          echo "flowR version to build binaries for: $fv"
          echo "flowr_version=$fv" >> "$GITHUB_OUTPUT"

      # The release is named after the adapter version (v<adapter>, created by
      # use_github_release from NEWS.md). Record the bundled flowR version in its
      # notes so the flowR version is discoverable without decoding the tag.
      - name: Note the bundled flowR version in the release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          FV: ${{ steps.fv.outputs.flowr_version }}
        run: |
          set -euo pipefail
          new_version=$(sed -n -E "s/Version: (.*)/\1/p" DESCRIPTION)
          tag="v$new_version"
          body=$(gh release view "$tag" --json body --jq .body || true)
          note="Bundles **flowR ${FV}** (the analysis engine). Prebuilt engine binaries for this flowR version are attached to the [\`flowr-v${FV}\`](https://github.com/${GITHUB_REPOSITORY}/releases/tag/flowr-v${FV}) asset release, downloaded on demand by the R client."
          printf '%s\n\n%s\n' "$note" "$body" | gh release edit "$tag" --notes-file - --latest

  # build + publish the native binaries to the flowr-v<flowR-version> release,
  # which is where the R client downloads them from
  binaries:
    needs: release
    uses: ./.github/workflows/binaries.yaml
    with:
      flowr_version: ${{ needs.release.outputs.flowr_version }}
      release_tag: flowr-v${{ needs.release.outputs.flowr_version }}
    secrets: inherit
