name: test
on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize]
    branches: [main]
  workflow_call:
jobs:
  devtools-check:
    strategy:
      # 4.1 is the floor: the test harness (devtools, current testthat) needs
      # R >= 4.1. The package itself only needs R >= 4.0 (serverSocket).
      matrix:
        r-version: [ '4.4.0', '4.3.2', '4.2.3', '4.1.0' ]
        os: [ ubuntu-latest ]
        include:
           - os: macos-latest
             r-version: '4.4.0'
           - os: windows-latest
             r-version: '4.4.0'
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.r-version }}
      - name: Install dependencies
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: devtools
      - name: Run devtools::check()
        # Fail on warnings/errors. NOTEs are allowed because the package ships
        # flowR's JS+wasm bundle in inst/flowr-js (a "sub-directories of 1Mb or
        # more" NOTE) and a "New submission" NOTE is expected. check() also
        # builds the vignettes, so a vignette that fails to knit fails CI here.
        run: Rscript -e 'devtools::check(error_on = "warning")'

  vignettes:
    name: vignettes install and are discoverable
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install pandoc
        uses: r-lib/actions/setup-pandoc@v2
      - name: Install R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.4.0'
      - name: Install dependencies (incl. vignette builders)
        uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::knitr, any::rmarkdown
      # Reproduce what users get from install_github(build_vignettes = TRUE):
      # build the tarball WITH vignettes, install it, and assert that
      # vignette("flowr") (and the others) are actually installed and findable,
      # so a broken VignetteBuilder / .Rbuildignore can never ship silently.
      - name: Build with vignettes, install, and verify they are available
        shell: bash
        run: |
          set -euo pipefail
          R CMD build . --no-manual
          pkg=$(ls -1 flowr_*.tar.gz | head -1)
          R CMD INSTALL "$pkg"
          Rscript -e '
            need <- c("flowr.Rmd", "flowr-engines.Rmd", "flowr-security.Rmd")
            have <- tools::getVignetteInfo("flowr")[, "File"]
            missing <- setdiff(need, have)
            if (length(missing)) {
              stop("installed vignettes missing: ", paste(missing, collapse = ", "))
            }
            v <- vignette("flowr")
            if (is.null(v$file) || !nzchar(v$file)) stop("vignette(\"flowr\") not found")
            cat("OK - installed and discoverable:\n"); print(have)
          '
